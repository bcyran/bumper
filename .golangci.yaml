version: "2"
run:
  tests: true
linters:
  enable:
    - errname
    - misspell
    - nilerr
    - predeclared
    - revive
    - thelper
    - unconvert
    - unparam
    - whitespace
  settings:
    revive:
      rules:
        - name: unused-parameter
          arguments:
            - allowRegex: ^_.*
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
